<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8" />
  <title>Lift Builder</title>

  <base href="/" />

  <meta name="color-scheme" content="light dark" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />

  <meta name="format-detection" content="telephone=no" />
  <meta name="msapplication-tap-highlight" content="no" />

  <!-- SEO & ASO -->
  <meta name="description" content="Lift Builder is the ultimate workout tracker for coaches and athletes. Log sets, track progress, manage clients, and visualize your gains. Available on iOS and Android." />
  <meta name="keywords" content="workout tracker, gym log, fitness app, personal trainer software, lift log, bodybuilding, powerlifting, strength training, client management" />
  <meta name="author" content="Lift Builder Team" />
  <meta name="robots" content="index, follow" />

  <!-- Open Graph / Social Sharing -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="Lift Builder - Track Your Gains" />
  <meta property="og:description" content="The ultimate workout tracker for coaches and athletes. Log sets, track progress, and manage clients." />
  <meta property="og:image" content="assets/icon/favicon.png" />
  <meta property="og:url" content="https://liftbuilder.app/" />
  <meta property="og:site_name" content="Lift Builder" />

  <!-- Twitter Card -->
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Lift Builder - Track Your Gains" />
  <meta name="twitter:description" content="The ultimate workout tracker for coaches and athletes. Log sets, track progress, and manage clients." />
  <meta name="twitter:image" content="assets/icon/favicon.png" />

  <!-- PWA & Mobile -->
  <link rel="manifest" href="manifest.webmanifest">
  <meta name="theme-color" content="#000000" />
  <link rel="icon" type="image/png" href="assets/icon/favicon.png" />
  <link rel="apple-touch-icon" href="assets/icon/favicon.png" />

  <!-- Structured Data (JSON-LD) -->
  <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Lift Builder",
      "operatingSystem": "iOS, Android",
      "applicationCategory": "HealthApplication",
      "aggregateRating": {
        "@type": "AggregateRating",
        "ratingValue": "4.8",
        "ratingCount": "120"
      },
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      }
    }
  </script>

  <!-- add to homescreen for ios -->
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black" />
</head>

<body style="background:#0a0a0a;margin:0">
  <app-root style="display:block;min-height:100vh;background:#0a0a0a"></app-root>
</body>

</html>
